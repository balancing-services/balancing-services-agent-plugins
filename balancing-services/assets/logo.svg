     <svg class="balance-svg" viewBox="75 75 250 250">
          <!-- Base triangle -->
          <path d="M175 250 L225 250 L200 200 Z" fill="#000000" />
          
          <!-- Balance group with exact transform origin -->
          <g transform-origin="200px 195px">
            <!-- Horizontal beam -->
            <rect x="100" y="190" width="200" height="10" fill="#000000" />
            
            <!-- Left weight -->
            <circle cx="120" cy="170" r="20" fill="#000000" />
            
            <!-- Right weight -->
            <circle cx="280" cy="170" r="20" fill="#000000" />
          </g>
        </svg>